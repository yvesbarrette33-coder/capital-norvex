  if (!id || !/^[A-Za-z0-9_-]{11}$/.test(id)) {

        <h2>${ui.errorTitle}</h2>

    return;

  const meta = (CAPSULES[id] && CAPSULES[id][lang]) || {
    kicker: "Capital Norvex",
    title: ui.fallbackTitle,
    subtitle: "",
  };

  document.title = meta.title.replace(/<[^>]+>/g, "") + ui.suffix;

  const embedSrc = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;

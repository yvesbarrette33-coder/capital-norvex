<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Norvex — Analyse de dossier IA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;
  --surface:#111111;
  --card:#161616;
  --border:#2A2A2A;
  --border-h:#3A3A3A;
  --gold:#C8A84B;
  --gold-l:#E2CA7E;
  --gold-d:#8C7030;
  --gold-glow:rgba(200,168,75,.18);
  --silver:#B8BCC8;
  --silver-l:#D8DCE8;
  --silver-d:#6A6E7A;
  --text:#F0EDE8;
  --muted:#7A7A80;
  --dim:#2E2E36;
  --green:#1A9E72;--green-bg:rgba(26,158,114,.08);--green-br:rgba(26,158,114,.25);
  --red:#C44040;--red-bg:rgba(196,64,64,.08);--red-br:rgba(196,64,64,.25);
  --amber:#C87830;--amber-bg:rgba(200,120,48,.08);--amber-br:rgba(200,120,48,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Barlow',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.cond{font-family:'Barlow Condensed',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px}

/* HEADER */
#hdr{background:#000;border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:64px}
.brand{display:flex;flex-direction:column;cursor:pointer;gap:0}
.brand-cap{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:6px;color:var(--silver);font-weight:600;text-transform:uppercase;line-height:1}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(--silver-l) 0%,var(--gold) 50%,var(--silver) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.brand-tag{font-size:9px;letter-spacing:2px;color:var(--muted);font-weight:300;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;margin-top:1px}
.ltog{display:flex;background:var(--surface);border-radius:6px;padding:3px;border:1px solid var(--border);gap:2px}
.lbtn{padding:5px 14px;border-radius:4px;font-size:11px;font-weight:700;background:transparent;color:var(--muted);cursor:pointer;border:none;transition:all .2s;font-family:'Barlow',sans-serif;letter-spacing:2px}
.lbtn.on{background:var(--gold);color:#0A0A0A}

/* LAYOUT */
#main{max-width:880px;margin:0 auto;padding:48px 24px 80px}

/* PROGRESS */
#pbar{display:flex;align-items:center;margin-bottom:48px}
.pstep{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:60px}
.pcirc{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .4s;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.pcirc.on{border-color:var(--gold);background:rgba(200,168,75,.1);color:var(--gold)}
.pcirc.dn{border-color:var(--gold);background:var(--gold);color:#0A0A0A}
.plbl{font-size:10px;color:var(--muted);white-space:nowrap;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;transition:color .4s}
.plbl.on{color:var(--gold)}
.pline{flex:1;height:1px;background:var(--border);margin:0 4px;margin-bottom:22px;transition:background .4s}
.pline.dn{background:var(--gold)}

/* SECTIONS */
.sec{animation:fadeUp .5s ease}
.hidden{display:none!important}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:32px 0 20px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.dvtxt{font-size:10px;letter-spacing:4px;color:var(--gold);font-weight:600;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px}
.ctit{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:22px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;letter-spacing:.5px}
.btn:hover{transform:translateY(-1px);opacity:.88}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.bp{background:linear-gradient(135deg,var(--gold-d),var(--gold),var(--gold-l));color:#0A0A0A}
.bs2{background:transparent;color:var(--muted);border:1px solid var(--border)}
.bgo{background:transparent;color:var(--gold);border:1px solid var(--gold)}

/* FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg .full{grid-column:span 2}
.flbl{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600;font-family:'Barlow',sans-serif}
.finp{width:100%;padding:12px 14px;background:#0F0F0F;border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.finp:focus{border-color:var(--gold)}
.finp::placeholder{color:var(--dim)}
textarea.finp{resize:vertical;min-height:80px}

/* TYPE GRID */
.tgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 8px;text-align:center;cursor:pointer;transition:all .2s}
.tcard:hover{border-color:var(--gold-d)}
.tcard.sel{border-color:var(--gold);background:rgba(200,168,75,.07)}
.tico{font-size:24px;margin-bottom:8px}
.tlbl{font-size:11px;line-height:1.4;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.tcard.sel .tlbl{color:var(--gold);font-weight:600}

/* DROP ZONE */
.dz{border:1px dashed var(--border);border-radius:12px;padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);margin-bottom:16px}
.dz:hover,.dz.drag{border-color:var(--gold);background:rgba(200,168,75,.03)}
.dzi{font-size:36px;margin-bottom:12px}
.dzt{font-size:16px;font-weight:600;margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.dzs{font-size:13px;color:var(--muted);margin-bottom:20px}
.dzb{display:inline-block;padding:9px 22px;background:transparent;border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:12px;font-weight:600;letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}

/* FILE LIST */
.flist{display:flex;flex-direction:column;gap:8px}
.fitem{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;animation:fadeUp .3s ease}
.finfo{display:flex;align-items:center;gap:12px}
.fname{font-size:13px;font-weight:500}
.fsize{font-size:11px;color:var(--muted)}
.frm{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;transition:color .2s}
.frm:hover{color:var(--red)}

/* DOC TYPES */
.dtgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.dti{padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:space-between;gap:6px}
.dti .req{font-size:8px;color:var(--gold);font-weight:700;letter-spacing:1px;white-space:nowrap;border:1px solid var(--gold-d);border-radius:3px;padding:1px 5px;flex-shrink:0}
.dti .opt{font-size:8px;color:var(--muted);letter-spacing:1px;white-space:nowrap;border:1px solid var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0}
/* SCORE NORVEX */
.snx-card{background:var(--card);border:1px solid var(--gold-d);border-radius:12px;padding:24px;margin-bottom:20px}
.snx-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.snx-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold)}
.snx-score{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:700;letter-spacing:2px;line-height:1}
.snx-rate{font-size:13px;font-weight:600;letter-spacing:1px;margin-top:4px}
.snx-bar-wrap{margin-bottom:20px}
.snx-bar-bg{background:var(--dim);border-radius:4px;height:8px;overflow:hidden}
.snx-bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.snx-criteres{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.snx-cr{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
.snx-cr-name{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.snx-cr-score{display:flex;align-items:center;gap:8px}
.snx-cr-pts{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700}
.snx-cr-max{font-size:10px;color:var(--muted)}
.snx-cr-comment{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}

/* LOADING */
#lwrap{text-align:center;padding:60px 0}
.spw{position:relative;width:100px;height:100px;margin:0 auto 44px}
.spo{position:absolute;inset:0;border-radius:50%;border:2px solid var(--border);border-top-color:var(--gold);animation:spin 1.2s linear infinite}
.spi{position:absolute;inset:14px;border-radius:50%;border:1px solid var(--border);border-bottom-color:var(--silver);animation:spin 2s linear infinite reverse}
.spe{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.lsteps{max-width:360px;margin:0 auto}
.lstep{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--border);opacity:.25;transition:opacity .5s}
.lstep:last-child{border-bottom:none}
.lstep.on{opacity:1}
.lstep.dn{opacity:.55}
.lsico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.lstxt{font-size:13px;font-family:'Barlow',sans-serif}
.lstep.on .lstxt{color:var(--gold);font-weight:500}

/* RESULTS */
.dbanner{border-radius:12px;padding:40px;text-align:center;margin-bottom:20px;border:1px solid}
.dlbl{font-size:9px;letter-spacing:5px;text-transform:uppercase;font-weight:700;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif}
.dico{font-size:52px;margin-bottom:10px}
.dtxt{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:700;letter-spacing:6px}
.damt{font-size:15px;color:var(--text);margin-top:14px;letter-spacing:1px}
.damt span{font-family:'Cormorant Garamond',Georgia,serif;font-size:34px;font-weight:600}

.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.rc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
.rl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.rv{font-family:'Cormorant Garamond',Georgia,serif;font-size:34px;font-weight:600;color:var(--gold)}

.fg2{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-bottom:20px}
.fc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px}
.fct{font-size:11px;letter-spacing:2px;font-weight:600;margin-bottom:14px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;color:var(--silver)}
.fcl{list-style:none;display:flex;flex-direction:column;gap:10px}
.fcl li{display:flex;gap:8px;font-size:13px;color:var(--muted);line-height:1.5}

.rtxt{color:var(--muted);line-height:1.85;font-size:14px;margin-bottom:14px}
.anote{padding:12px 16px;background:rgba(200,168,75,.05);border-left:2px solid var(--gold);border-radius:0 6px 6px 0;font-size:13px;color:var(--gold);font-style:italic}

.lcta{text-align:center;padding:36px}
.lctai{font-size:36px;margin-bottom:10px}
.lctat{font-family:'Barlow Condensed',sans-serif;font-size:20px;letter-spacing:3px;font-weight:600;margin-bottom:8px;text-transform:uppercase}
.lctas{color:var(--muted);font-size:13px;margin-bottom:24px;line-height:1.7}
.lctab{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}

/* ERROR */
.ebox{background:var(--red-bg);border:1px solid var(--red-br);border-radius:8px;padding:14px 18px;margin-bottom:18px;color:var(--red);font-size:13px}

/* LOI MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s ease}
.mwrap{width:100%;max-width:840px;display:flex;flex-direction:column;gap:14px;max-height:90vh}
.mhdr{display:flex;justify-content:space-between;align-items:center}
.mtit{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-weight:600}
.mbtns{display:flex;gap:10px}
#mframe{border-radius:8px;border:none;background:white;min-height:60vh;flex:1;width:100%}

/* HERO */
.hero{text-align:center;padding:64px 0 40px}
.hero-logo-wrap{margin-bottom:32px}
.hero-logo-cap{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:8px;color:var(--silver-d);font-weight:400;text-transform:uppercase;margin-bottom:4px}
.hero-logo-name{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:700;letter-spacing:8px;background:linear-gradient(135deg,var(--silver-l) 0%,var(--gold-l) 35%,var(--gold) 55%,var(--silver) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px}
.hero-logo-tag{font-size:12px;letter-spacing:2px;color:var(--silver-d);font-family:'Cormorant Garamond',serif;font-style:italic}
.hero-line{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:28px auto}
.htit{font-family:'Cormorant Garamond',Georgia,serif;font-size:36px;font-weight:600;line-height:1.3;max-width:600px;margin:0 auto 16px;font-style:italic}
.hsub{font-size:14px;color:var(--muted);max-width:500px;margin:0 auto 36px;line-height:1.8;letter-spacing:.3px}
.hpills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:36px}
.hpill{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:4px;font-size:11px;font-weight:500;font-family:'Barlow',sans-serif;letter-spacing:.5px}
.htypes{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:60px;opacity:.4}
.htc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 8px;text-align:center}
.htci{font-size:20px;margin-bottom:6px}
.htcl{font-size:10px;color:var(--muted);line-height:1.3;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}

.snav{display:flex;justify-content:space-between;align-items:center;margin-top:10px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.apulse{animation:pulse 1.8s ease infinite}

/* RESPONSIVE */
@media(max-width:620px){
  #hdr{padding:0 16px}
  #main{padding:28px 16px 60px}
  .hero-logo-name{font-size:52px}
  .htit{font-size:26px}
  .tgrid{grid-template-columns:repeat(3,1fr)}
  .fg{grid-template-columns:1fr}
  .fg .full{grid-column:span 1}
  .rg{grid-template-columns:1fr}
  .htypes{grid-template-columns:repeat(3,1fr)}
  .dtxt{font-size:36px}
}
</style>
</head>

    </div>
    <div class="snav">
      <button class="btn bs2" onclick="go(0)" id="s1-back"></button>
      <button class="btn bp" onclick="tryGo2()" id="s1-next"></button>
    </div>
  </section>

  <!-- STEP 2 -->
  <section id="s2" class="sec hidden">
    <div class="card">
      <h2 class="ctit" id="s2-title"></h2>
      <div class="dz" id="dz" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)" onclick="document.getElementById('fi').click()">
        <div class="dzi">📂</div>
        <p class="dzt" id="dz-t"></p>
        <p class="dzs" id="dz-s"></p>
        <span class="dzb" id="dz-b"></span>
      </div>
      <input type="file" id="fi" accept=".pdf" multiple style="display:none" onchange="fiInput(event)">
      <div class="flist" id="flist"></div>
    </div>
    <div class="card">
      <h3 class="ctit" style="font-size:10px;margin-bottom:12px" id="s2-dtitle"></h3>
      <div class="dtgrid" id="dtgrid"></div>
    </div>
    <div id="errbox" class="ebox hidden"></div>
    <div class="snav">
      <button class="btn bs2" onclick="go(1)" id="s2-back"></button>
      <button class="btn bp" onclick="runAnalysis()" id="s2-analyze"></button>
    </div>
  </section>

  <!-- STEP 3 LOADING -->
  <section id="s3" class="sec hidden">
    <div id="lwrap">
      <div class="spw"><div class="spo"></div><div class="spi"></div><div class="spe">🤖</div></div>
      <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px" id="s3-title"></h2>
      <p style="color:var(--muted);font-size:13px;margin-bottom:40px;letter-spacing:.5px" id="s3-sub"></p>
      <div class="lsteps" id="lsteps"></div>
    </div>
  </section>

  <!-- STEP 4 RESULTS -->
  <section id="s4" class="sec hidden">
    <div id="dbanner"></div>
    <div id="rsec" class="card hidden">
      <h2 class="ctit" id="r-rtit"></h2>
      <div class="rg" id="rgrid"></div>
    </div>
    <div id="rezsec" class="card hidden">
      <h2 class="ctit" id="r-sumtit"></h2>
      <p class="rtxt" id="rtxt"></p>
      <div class="anote hidden" id="anote"></div>
    </div>
    <div class="fg2" id="findings"></div>
    <div id="loicta" class="card lcta hidden">
      <div class="lctai">📄</div>
      <h3 class="lctat" id="r-loitit"></h3>
      <p class="lctas" id="r-loisub"></p>
      <div class="lctab">
        <button class="btn bp" onclick="openLOI()" id="r-loibtn"></button>
        <button class="btn bgo" onclick="printLOI()" id="r-prbtn"></button>
      </div>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="btn bs2" onclick="reset()" id="r-new"></button>
    </div>
  </section>

</main>

function t(k){return T[S.lang][k]||k}
function g(id){return document.getElementById(id)}
function show(id){g(id)&&g(id).classList.remove('hidden')}
function hide(id){g(id)&&g(id).classList.add('hidden')}
function fmtCAD(n){return new Intl.NumberFormat('fr-CA',{style:'currency',currency:'CAD',maximumFractionDigits:0}).format(n)}

function setLang(l){
  S.lang=l;document.documentElement.lang=l;
  document.querySelectorAll('.lbtn').forEach((b,i)=>b.classList.toggle('on',i===(l==='fr'?0:1)));
  renderAll();
}
function go(n){
  S.step=n;
  [0,1,2,3,4].forEach(i=>{
    const el=g('s'+i);if(!el)return;
    if(i===n){el.classList.remove('hidden');el.style.animation='none';el.offsetHeight;el.style.animation=''}
    else el.classList.add('hidden');
  });
  n===0?hide('pbar'):show('pbar');
  renderPbar();window.scrollTo(0,0);
}
function selectType(id){S.type=id;renderTypes()}
function tryGo2(){
  if(!S.ci.name||!S.ci.email||!S.type){
    alert(S.lang==='fr'?'Veuillez remplir les champs obligatoires (*) et sélectionner un type de financement.':'Please fill required fields (*) and select a financing type.');return;
  }
  go(2);
}
function dzOver(e){e.preventDefault();g('dz').classList.add('drag')}
function dzLeave(){g('dz').classList.remove('drag')}
function dzDrop(e){e.preventDefault();g('dz').classList.remove('drag');addFiles(Array.from(e.dataTransfer.files))}
function fiInput(e){addFiles(Array.from(e.target.files));e.target.value=''}
function addFiles(files){S.files=[...S.files,...files.filter(f=>f.type==='application/pdf')];renderFiles()}
function removeFile(i){S.files.splice(i,1);renderFiles()}
function renderFiles(){
  const el=g('flist');if(!el)return;el.innerHTML='';
  if(!S.files.length)return;
  const c=document.createElement('p');c.style.cssText='font-size:12px;color:var(--gold);font-weight:600;margin-bottom:10px;letter-spacing:1px;font-family:Barlow Condensed,sans-serif;text-transform:uppercase';c.textContent=t('fc')(S.files.length);el.appendChild(c);
  S.files.forEach((f,i)=>{
    const d=document.createElement('div');d.className='fitem';
    d.innerHTML=`<div class="finfo"><span style="font-size:18px">📄</span><div><div class="fname">${f.name}</div><div class="fsize">${(f.size/1024/1024).toFixed(2)} MB</div></div></div><button class="frm" onclick="removeFile(${i})">×</button>`;
    el.appendChild(d);
  });
}
async function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)})}

async function runAnalysis(){
  go(3);S.lisidx=0;S.lidx=0;renderLSteps();
  S.ltimer=setInterval(()=>{if(S.lidx<t('asteps').length-1){S.lidx++;renderLSteps()}},3000);
  hide('errbox');
  await doAnalysis(true);
}

async function doAnalysis(withPDFs){
  const apiKey=getKey();
  if(!apiKey||!apiKey.startsWith('sk-ant-')){
    clearInterval(S.ltimer);go(2);
    const eb=g('errbox');eb.classList.remove('hidden');

    return;
  }
  try{
    const content=[];
    let pdfNote='';

    if(withPDFs && S.files.length>0){
      const MAX_MB=4;
      const okFiles=S.files.filter(f=>f.type==='application/pdf'&&f.size<=MAX_MB*1024*1024);
      const bigFiles=S.files.filter(f=>f.type==='application/pdf'&&f.size>MAX_MB*1024*1024);
      if(bigFiles.length>0){
        const names=bigFiles.map(f=>f.name).join(', ');
        pdfNote=S.lang==='fr'
          ?`Note: Fichiers trop volumineux ignorés (>100 pages estimées): ${names}`
          :`Note: Files too large skipped (>100 pages est.): ${names}`;
      }
      for(const f of okFiles){
        try{
          const b64=await toB64(f);
          content.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
        }catch(e){console.warn('PDF skip',f.name,e)}
      }
    }

    const types=T[S.lang].types;
    const lbl=types.find(x=>x.id===S.type)?.l||S.type;
    const amt=S.ci.amount?fmtCAD(Number(S.ci.amount)):'Non spécifié / Not specified';
    const today=new Date().toLocaleDateString(S.lang==='fr'?'fr-CA':'en-CA',{year:'numeric',month:'long',day:'numeric'});
    const expD=new Date();let bd=0;while(bd<3){expD.setDate(expD.getDate()+1);if(expD.getDay()!==0&&expD.getDay()!==6)bd++;}
    const exp=expD.toLocaleDateString(S.lang==='fr'?'fr-CA':'en-CA',{year:'numeric',month:'long',day:'numeric'});
    const outLang=S.lang==='fr'?'French (français)':'English';
    const yr=new Date().getFullYear();
    const rid=Math.floor(Math.random()*9000)+1000;
    const refId=`CNV-${yr}-${rid}`;
    const pdfCount=content.length;
    const pdfNames=S.files.map(f=>f.name).join(', ')||'None';

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content}]})
    });

    if(!resp.ok){
      const errText=await resp.text();
      // If PDF page limit error, retry without PDFs
      if(resp.status===400&&errText.includes('PDF pages')&&withPDFs){
        console.warn('PDF too long, retrying without PDFs');
        clearInterval(S.ltimer);
        S.lidx=0;renderLSteps();
        S.ltimer=setInterval(()=>{if(S.lidx<t('asteps').length-1){S.lidx++;renderLSteps()}},3000);
        // Show warning
        const eb=g('errbox');
        eb.classList.remove('hidden');
        eb.style.background='rgba(200,168,75,.08)';
        eb.style.borderColor='rgba(200,168,75,.3)';
        eb.style.color='var(--gold)';
        eb.textContent=S.lang==='fr'
          ?'⚠️ PDF trop volumineux (>100 pages). Analyse en cours sur les informations du formulaire...'
          :'⚠️ PDF too large (>100 pages). Analyzing based on form information...';
        await doAnalysis(false);
        return;
      }
      throw new Error(`API ${resp.status}: ${errText}`);
    }

    const data=await resp.json();
    const txt=data.content.map(b=>b.text||'').join('').replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const match=txt.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('Format de réponse invalide — veuillez réessayer.');
    clearInterval(S.ltimer);
    S.analysis=JSON.parse(match[0]);
    saveToPipeline(S.analysis,S.ci,S.type,refId);
    if(!withPDFs&&S.files.length>0){
      // Add note to analysis
      const noteKey=S.lang==='fr'?'note_analyste':'note_analyste';
      S.analysis[noteKey]=(S.analysis[noteKey]||'')+' ['+( S.lang==='fr'?'Analyse basée sur le formulaire — PDF trop volumineux pour traitement direct':'Analysis based on form data — PDF too large for direct processing')+']';
    }
    setTimeout(()=>{renderResults();go(4)},700);
  }catch(err){
    clearInterval(S.ltimer);go(2);
    const eb=g('errbox');
    eb.classList.remove('hidden');
    eb.style.background='';eb.style.borderColor='';eb.style.color='';
    eb.textContent=`${t('errTit')}: ${err.message}`;
  }
}

      <div class="snx-criteres">
        ${crList.map(c=>{const ci=cr[c.key]||{};const pts=ci.score||0;const pct=Math.round(pts/c.max*100);const cc=pct>=80?'var(--green)':pct>=60?'var(--gold)':'var(--amber)';return`<div class="snx-cr"><div class="snx-cr-name">${c.lbl}</div><div class="snx-cr-score"><div class="snx-cr-pts" style="color:${cc}">${pts}</div><div class="snx-cr-max">/ ${c.max}</div><div style="flex:1;height:4px;background:var(--dim);border-radius:2px;margin-left:8px"><div style="height:100%;width:${pct}%;background:${cc};border-radius:2px"></div></div></div>${ci.commentaire?`<div class="snx-cr-comment">${ci.commentaire}</div>`:''}</div>`}).join('')}

async function saveToPipeline(analysis,ci,type,refId){
  try{
    const yr=new Date().getFullYear();
    const id=refId||`CNV-${yr}-${Math.floor(Math.random()*9000)+1000}`;
    const parts=(ci.name||'').trim().split(' ');
    const prenom=parts[0]||ci.company||'';

    const typeMap={hyp:'Commercial',con:'Construction',ref:'Refinancement',rel:'Pont',inf:'Infrastructure'};
    const score=analysis.score_norvex?.total||null;
    const montantRec=analysis.montant_recommande||0;

    const decision=analysis.decision||'';
    const isApproved=decision.includes('APPROUVÉ')||decision.includes('APPROVED');
    const isRefused=decision.includes('REFUSÉ')||decision.includes('REFUSED')||decision.includes('DECLINED');
    const priorite=isRefused?'high':score>=85?'low':'med';
    const now=new Date().toLocaleString('fr-CA',{dateStyle:'short',timeStyle:'short'});
    await _db.collection('dossiers').doc(id).set({
      id,prenom,nom,
      email:ci.email||'',tel:ci.phone||'',
      type:typeMap[type]||'Commercial',
      montant:montantRec||montantDem,
      adresse:ci.address||'',
